# Build Android Expo dans Docker
# Usage: docker compose -f docker-compose.build.yml run --rm build
services:
  build:
    build:
      context: .
      dockerfile: Dockerfile.android
    volumes:
      - .:/app
      - gradle-cache:/root/.gradle
    working_dir: /app
    environment:
      - ANDROID_HOME=/opt/android-sdk
    # Produit l'APK dans android/app/build/outputs/apk/debug/ (sans émulateur)
    command: sh -c "echo 'sdk.dir=/opt/android-sdk' > android/local.properties && npm install && cd android && ./gradlew assembleDebug"

volumes:
  gradle-cache:
